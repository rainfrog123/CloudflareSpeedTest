name: Build and Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build test
        run: go build -v .

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: get_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          
          # Determine output filename
          if [ "${{ matrix.goarm }}" != "" ]; then
            OUTPUT_NAME="cfst_${{ matrix.goos }}_${{ matrix.goarch }}v${{ matrix.goarm }}"
          else
            OUTPUT_NAME="cfst_${{ matrix.goos }}_${{ matrix.goarch }}"
          fi
          
          # Build
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "cfst${{ matrix.suffix }}"
          
          # Create archive directory
          mkdir -p "${OUTPUT_NAME}"
          mv "cfst${{ matrix.suffix }}" "${OUTPUT_NAME}/"
          cp ip.txt "${OUTPUT_NAME}/"
          cp ipv6.txt "${OUTPUT_NAME}/"
          
          # Create archive
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${OUTPUT_NAME}.zip" "${OUTPUT_NAME}"
            echo "ASSET=${OUTPUT_NAME}.zip" >> $GITHUB_OUTPUT
          else
            tar -czvf "${OUTPUT_NAME}.tar.gz" "${OUTPUT_NAME}"
            echo "ASSET=${OUTPUT_NAME}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfst_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: cfst_*
          retention-days: 1

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -la release/

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CloudflareSpeedTest ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
